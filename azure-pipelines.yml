# 自动发现并推送 Senparc.Ncf.* / Senparc.Xncf.* 的 .nupkg（仅 .nupkg；符号包 .snupkg 未包含，可按需扩展）
# 凭据：脚本无法使用 NuGetAuthenticate 注入仅含 ApiKey 的 nuget.org 服务连接（Microsoft 文档限制），
# 请在 Pipeline 中配置机密变量 NUGET_API_KEY（与「nuget-jeffrey-full-key」服务连接中的 NuGet.org API Key 相同即可）。
- powershell: |
    $ErrorActionPreference = 'Continue'
    $root = "$(Build.SourcesDirectory)"
    $source = "$(NuGetPushSource)"
    $apiKey = $env:NUGET_API_KEY
    if ([string]::IsNullOrWhiteSpace($apiKey)) {
      Write-Host "##[error]缺少机密变量 NUGET_API_KEY：请在 Pipeline / Variable group 中设置（NuGet.org 推送用 API Key，可与服务连接 nuget-jeffrey-full-key 使用同一密钥）。"
      exit 2
    }

    Add-Type -AssemblyName System.IO.Compression.FileSystem

    function Get-NupkgMetadataFromZip {
      param([string]$PackagePath)
      try {
        $zip = [System.IO.Compression.ZipFile]::OpenRead($PackagePath)
        try {
          $entry = $zip.Entries | Where-Object { $_.FullName -match '(?i)\.nuspec$' } | Select-Object -First 1
          if (-not $entry) {
            return @{ Id = ''; Version = '' }
          }
          $r = New-Object System.IO.StreamReader($entry.Open())
          try {
            $txt = $r.ReadToEnd()
          } finally { $r.Close() }
          $xml = New-Object System.Xml.XmlDocument
          $xml.PreserveWhitespace = $true
          $xml.LoadXml($txt)
          $nsUri = $xml.DocumentElement.NamespaceURI
          $id = $null
          $ver = $null
          if ([string]::IsNullOrEmpty($nsUri)) {
            $id = $xml.package.metadata.id
            $ver = $xml.package.metadata.version
          } else {
            $nsm = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $nsm.AddNamespace('n', $nsUri)
            $meta = $xml.SelectSingleNode('//n:metadata', $nsm)
            if ($meta) {
              $idN = $meta.SelectSingleNode('n:id', $nsm)
              $verN = $meta.SelectSingleNode('n:version', $nsm)
              if ($idN) { $id = $idN.InnerText }
              if ($verN) { $ver = $verN.InnerText }
            }
          }
          return @{ Id = [string]$id; Version = [string]$ver }
        } finally { $zip.Dispose() }
      } catch {
        return @{ Id = ''; Version = '' }
      }
    }

    function Test-SenparcPackageFileName {
      param([string]$FileName)
      return ($FileName.StartsWith('Senparc.Ncf.', [System.StringComparison]::Ordinal) -or
        $FileName.StartsWith('Senparc.Xncf.', [System.StringComparison]::Ordinal))
    }

    $candidates = Get-ChildItem -Path $root -Recurse -File -Filter '*.nupkg' -ErrorAction SilentlyContinue |
      Where-Object { Test-SenparcPackageFileName $_.Name } |
      Sort-Object FullName -Unique
    $rows = New-Object System.Collections.Generic.List[object]

    Write-Host "== Senparc NuGet push: discovered $($candidates.Count) package file(s) under $root =="

    $anyUnexpectedFailure = $false

    foreach ($f in $candidates) {
      $path = $f.FullName
      $meta = Get-NupkgMetadataFromZip $path
      $pkgId = if ([string]::IsNullOrWhiteSpace($meta.Id)) { $f.BaseName } else { $meta.Id }
      $pkgVer = if ([string]::IsNullOrWhiteSpace($meta.Version)) { '' } else { $meta.Version }

      Write-Host ("##[command] dotnet nuget push ""{0}"" --source ""{1}"" --api-key *** --skip-duplicate" -f $path, $source)

      $stdoutPath = Join-Path $env:TEMP ("nuget-push-{0}.out.txt" -f [Guid]::NewGuid().ToString('N'))
      $stderrPath = Join-Path $env:TEMP ("nuget-push-{0}.err.txt" -f [Guid]::NewGuid().ToString('N'))
      try {
        # 使用逗号分隔的 ArgumentList，避免 Windows PowerShell 5.1 对数组变量的已知问题
        $p = Start-Process -FilePath 'dotnet' -ArgumentList 'nuget', 'push', $path, '--source', $source, '--api-key', $apiKey, '--skip-duplicate', '--timeout', '3600' -NoNewWindow -Wait -PassThru `
          -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath
        $out = (Get-Content -LiteralPath $stdoutPath -Raw -ErrorAction SilentlyContinue)
        $err = (Get-Content -LiteralPath $stderrPath -Raw -ErrorAction SilentlyContinue)
        $code = $p.ExitCode
      } finally {
        Remove-Item -LiteralPath $stdoutPath -Force -ErrorAction SilentlyContinue
        Remove-Item -LiteralPath $stderrPath -Force -ErrorAction SilentlyContinue
      }

      $combined = (@($out, $err) | Where-Object { $_ }) -join "`n"
      $result = 'Failed'
      $reason = ''

      # --skip-duplicate: 成功退出码 0，重复包通常会有 skip / already exists 类提示
      if ($code -eq 0) {
        $lower = if ($combined) { $combined.ToLowerInvariant() } else { '' }
        if ($lower -match 'skip|already exists|duplicate|409') {
          $result = 'Skipped (exists)'
          if ($combined) {
            $one = ($combined.Trim() -replace '\s+', ' ')
            if ($one.Length -gt 200) { $reason = $one.Substring(0, 200) + '...' } else { $reason = $one }
          }
        } else {
          $result = 'Published'
        }
      } else {
        # 非 0：409 Conflict / 已存在 仍视为跳过；其余为失败
        $lower = if ($combined) { $combined.ToLowerInvariant() } else { '' }
        if ($lower -match '409|conflict|already exists|duplicate|cannot publish.*exists') {
          $result = 'Skipped (exists)'
          if ($combined) {
            $one = ($combined.Trim() -replace '\s+', ' ')
            if ($one.Length -gt 200) { $reason = $one.Substring(0, 200) + '...' } else { $reason = $one }
          }
        } else {
          $anyUnexpectedFailure = $true
          $result = 'Failed'
          $reason = if ($combined) { ($combined.Trim() -replace '\s+', ' ') } else { ("dotnet exit code {0}" -f $code) }
          if ($reason.Length -gt 400) { $reason = $reason.Substring(0, 400) + '...' }
        }
      }

      $rows.Add([pscustomobject]@{
          PackageId = $pkgId
          Version   = $pkgVer
          Path      = $path
          Result    = $result
          Detail    = $reason
        })
    }

    Write-Host ''
    Write-Host '========== NuGet push summary (PackageId | Version | Path | Result) =========='
    foreach ($r in $rows) {
      $pathDisp = $r.Path
      if ($pathDisp.Length -gt 120) { $pathDisp = '...' + $pathDisp.Substring([Math]::Max(0, $pathDisp.Length - 117)) }
      Write-Host ('| {0} | {1} | {2} | {3} |' -f $r.PackageId, $r.Version, $pathDisp, $r.Result)
      if ($r.Detail) {
        Write-Host ('  Reason: {0}' -f $r.Detail)
      }
    }
    Write-Host '==============================================================================='
    Write-Host ('Total: {0}  (Published / Skipped / Failed 见上表 Result 列)' -f $rows.Count)
    Write-Host 'Job exit: 发现与推送循环已执行完毕；若存在非重复性错误则失败。'

    if ($anyUnexpectedFailure) {
      Write-Host "##[error]One or more package pushes failed (see summary table)."
      exit 1
    }
    exit 0
  displayName: 'Push Senparc .nupkg (auto-discover, skip duplicates)'
  condition: succeededOrFailed()
  env:
    NUGET_API_KEY: $(NUGET_API_KEY)

- task: DotNetCoreCLI@2    
  displayName: Publish    
  inputs:      
    command: publish      
    publishWebProjects: True      
    arguments: '--configuration $(BuildConfiguration) --output $(build.artifactstagingdirectory)'      
    zipAfterPublish: True    
  enabled: false  
  
- task: PublishBuildArtifacts@1    
  displayName: 'Publish Artifact'    
  inputs:      
    PathtoPublish: '$(build.artifactstagingdirectory)'    
  enabled: false    
  condition: succeededOrFailed()  
